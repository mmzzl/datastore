version: '3.8'
services:
  mongodb:
    image: mongo:7
    container_name: after-market-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  api:
    build: .
    container_name: after-market-api
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: after-market-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mongo_data:
