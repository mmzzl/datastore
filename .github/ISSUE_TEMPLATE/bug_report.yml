name: Bug Report
description: 报告一个bug
labels: [bug]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        感谢提交bug报告！请填写以下信息。
  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      options:
        - P0-Critical
        - P1-High
        - P2-Medium
        - P3-Low
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: 受影响模块
      options:
        - 后端-API
        - 后端-认证
        - 后端-监控
        - 后端-回测
        - 后端-Qlib
        - 后端-调度
        - 前端-页面
        - 前端-组件
        - 前端-服务
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug描述
      placeholder: 清晰描述遇到的问题
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 进入 '...'
        2. 点击 '...'
        3. 滚动到 '...'
        4. 看到错误
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志/截图
      placeholder: 粘贴相关日志或截图
  - type: input
    id: environment
    attributes:
      label: 环境信息
      placeholder: "Python 3.11, Windows 11, Chrome 120"
