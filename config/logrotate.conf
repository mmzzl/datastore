# Logrotate configuration for Qlib training jobs
# Location: /etc/logrotate.d/qlib-training
#
# Install:
#   sudo cp config/logrotate.conf /etc/logrotate.d/qlib-training
#   sudo chmod 644 /etc/logrotate.d/qlib-training
#   sudo logrotate -f /etc/logrotate.d/qlib-training  # Test
#
# Manual rotation:
#   sudo logrotate -v /etc/logrotate.d/qlib-training

# Application logs
{{LOG_DIR}}/app.log
{{LOG_DIR}}/scheduler.log
{{LOG_DIR}}/qlib_training.log
{{LOG_DIR}}/backtest.log
{{LOG_DIR}}/risk_report.log {
    # Rotate daily
    daily

    # Keep 90 days of logs (retention policy)
    rotate 90

    # Compress rotated logs
    compress

    # Delay compression until next rotation
    delaycompress

    # Don't error if log file is missing
    missingok

    # Don't rotate empty files
    notifempty

    # Create new log file with same permissions
    create 0644 {{USER}} {{GROUP}}

    # Handle log file moves
    copytruncate

    # Add date extension to rotated files
    dateext

    # Date format for rotated files
    dateformat -%Y%m%d

    # Run prerotate scripts
    sharedscripts

    # Script to run before rotation
    prerotate
        # Notify monitoring that logs are being rotated
        if [ -f /tmp/qlib_training.pid ]; then
            kill -USR1 $(cat /tmp/qlib_training.pid) 2>/dev/null || true
        fi
    endscript

    # Script to run after rotation
    postrotate
        # Create symlink to latest log for easy access
        for log in app scheduler qlib_training backtest risk_report; do
            latest=$(ls -t {{LOG_DIR}}/${log}.log* 2>/dev/null | head -n1)
            if [ -n "$latest" ]; then
                ln -sf "$latest" {{LOG_DIR}}/${log}_latest.log 2>/dev/null || true
            fi
        done
    endscript
}

# Training job specific logs (high volume)
{{LOG_DIR}}/training_jobs/*.log {
    # Rotate daily
    daily

    # Keep 90 days
    rotate 90

    # Compress
    compress
    delaycompress

    # Handle missing files
    missingok
    notifempty

    # Create with proper permissions
    create 0644 {{USER}} {{GROUP}}

    # Wildcard pattern matching
    copytruncate
    dateext
    dateformat -%Y%m%d
}

# Job execution logs
{{LOG_DIR}}/executions/*.log {
    daily
    rotate 90
    compress
    delaycompress
    missingok
    notifempty
    create 0644 {{USER}} {{GROUP}}
    copytruncate
    dateext
}

# Archive older compressed logs
{{LOG_DIR}}/archive/*.gz {
    # Monthly cleanup of archive
    monthly

    # Keep 12 months in archive (1 year total retention)
    rotate 12

    # Already compressed
    nocompress

    # Remove old archives
    missingok
    notifempty
    create 0644 {{USER}} {{GROUP}}
}
